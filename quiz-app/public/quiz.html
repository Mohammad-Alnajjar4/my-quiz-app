<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Quiz - Interactive Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body onload="initQuiz()">

  <header>
    <h1>Active Quiz</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>

  <main>
    <section>
      <h2>Answer all the questions below!</h2>
      <div id="timer">Time: <span id="time">60</span>s</div>
      <div style="clear: both; margin-bottom: 20px;"></div>
      
      <div id="quiz-questions">
        <!-- Questions injected dynamically by script.js -->
      </div>
      
      <button onclick="submitQuiz()">Submit Quiz</button>
    </section>
  </main>

  <footer>
    &copy; 2026 Quiz App Project
  </footer>

  <script src="script.js"></script>
</body>
</html>
