<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Interactive Quiz</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #E5E7EB;
    }
    th {
      background-color: #F9FAFB;
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      font-weight: bold;
      background: #EEF2FF;
      color: var(--primary);
    }
  </style>
</head>
<body>

  <header style="background: linear-gradient(135deg, #111827, #374151);">
    <h1>Admin Dashboard</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="admin.html" style="color: var(--primary);">Admin Logs</a>
  </nav>

  <div class="admin-container">
    <h2>System Overview</h2>
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
      <div style="background: #F3F4F6; padding: 15px; border-radius: 8px; flex: 1; text-align: center;">
        <h3 style="margin: 0;">Total Users</h3>
        <p id="total-users" style="font-size: 2em; margin: 10px 0; font-weight: bold; color: var(--primary);">0</p>
      </div>
      <div style="background: #F3F4F6; padding: 15px; border-radius: 8px; flex: 1; text-align: center;">
        <h3 style="margin: 0;">Total Events</h3>
        <p id="total-events" style="font-size: 2em; margin: 10px 0; font-weight: bold; color: var(--secondary);">0</p>
      </div>
    </div>

    <h2>Live Activity Logs</h2>
    <p>Track every single thing that happens on the website!</p>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>User</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="logs-table-body">
        <tr><td colspan="3">Loading logs...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function fetchAdminData() {
      try {
        const res = await fetch('http://localhost:3000/api/logs');
        const data = await res.json();
        
        document.getElementById('total-users').innerText = data.users.length;
        document.getElementById('total-events').innerText = data.logs.length;
        
        const tbody = document.getElementById('logs-table-body');
        tbody.innerHTML = '';
        
        if (data.logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3">No activity recorded yet.</td></tr>';
          return;
        }

        data.logs.forEach(log => {
          const date = new Date(log.date).toLocaleString();
          let badgeColor = '#EEF2FF';
          let textColor = '#4F46E5';
          
          if(log.action.includes('Failed')) {
            badgeColor = '#FEE2E2'; textColor = '#EF4444';
          } else if(log.action.includes('Submitted')) {
            badgeColor = '#D1FAE5'; textColor = '#059669';
          }

          tbody.innerHTML += `
            <tr>
              <td style="font-size: 0.9em; color: #6B7280;">${date}</td>
              <td><strong>${log.username}</strong></td>
              <td><span class="badge" style="background: ${badgeColor}; color: ${textColor};">${log.action}</span></td>
            </tr>
          `;
        });
      } catch(err) {
        console.error(err);
      }
    }

    // Fetch immediately
    fetchAdminData();
    // Refresh every 5 seconds!
    setInterval(fetchAdminData, 5000);
  </script>
</body>
</html>
