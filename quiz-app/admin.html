<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Quiz App</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 2.5rem;
      position: relative;
    }
    
    .stats-grid {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    
    .stat-card {
      background: var(--bg-option);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: var(--radius-btn);
      flex: 1;
      text-align: center;
      transition: var(--transition);
    }
    
    .stat-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-glow);
    }
    
    .stat-card h3 {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    
    .stat-card p {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
      text-shadow: 0 0 20px rgba(110, 231, 183, 0.2);
    }
    
    .stat-card.secondary p {
      color: var(--accent-2);
      text-shadow: 0 0 20px rgba(129, 140, 248, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    th, td {
      text-align: left;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    tbody tr {
      transition: var(--transition);
    }
    
    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }
    
    td {
      color: var(--text-primary);
    }
    
    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>

  <nav class="navbar fade-up delay-1">
    <div class="nav-brand">Quiz<span style="color: var(--accent)">App</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="admin.html" style="color: var(--accent); border-bottom: 2px solid var(--accent);">Admin</a>
    </div>
  </nav>

  <main style="align-items: flex-start; padding-top: 3rem;">
    <div class="admin-container fade-up delay-2">
      <div class="badge fade-up delay-3" style="background: rgba(129, 140, 248, 0.1); color: var(--accent-2); border: 1px solid var(--accent-2-dim); margin-bottom: 1rem;">🔒 Authorized Access Only</div>
      <h1 class="fade-up delay-3" style="font-size: 2.2rem;">Live Registry & Statistics</h1>
      <p class="fade-up delay-4">Monitor real-time data directly from your Supabase cloud database.</p>
      
      <div class="stats-grid fade-up delay-4">
        <div class="stat-card">
          <h3>Total Registered Users</h3>
          <p id="total-users">0</p>
        </div>
        <div class="stat-card secondary">
          <h3>Total Quizzes Taken</h3>
          <p id="total-events">0</p>
        </div>
      </div>

      <h2 class="fade-up delay-4" style="margin-top: 2rem; font-size: 1.4rem;">Live Database Logs</h2>
      
      <div style="overflow-x: auto;" class="fade-up delay-4">
        <table>
          <thead>
            <tr>
              <th>Date & Time</th>
              <th>Registry Name</th>
              <th>Score</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="logs-table-body">
            <tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading live Supabase data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // Initialize Supabase correctly
    const SUPABASE_URL = 'https://vgrbteilsrqyttgvdoki.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZncmJ0ZWlsc3JxeXR0Z3Zkb2tpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTY0MjksImV4cCI6MjA5MzA3MjQyOX0.EZk9GbJHjoOmFlDTo5DvPGNWYPQdVa0zWfqFhiF9YF0';
    
    let supabase = null;
    try {
      if (window.supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (error) {
      console.error("Supabase init error:", error);
    }

    async function fetchAdminData() {
      const tbody = document.getElementById('logs-table-body');
      
      if (!supabase) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--wrong);">Database connection failed. Check API Key.</td></tr>';
        return;
      }

      try {
        // Fetch all scores from Supabase
        const { data, error } = await supabase
          .from('scores')
          .select('*')
          .order('date', { ascending: false });
          
        if (error) throw error;
        
        // Calculate total unique users
        const uniqueUsers = new Set(data.map(item => item.username)).size;
        
        document.getElementById('total-users').innerText = uniqueUsers;
        document.getElementById('total-events').innerText = data.length;
        
        tbody.innerHTML = '';
        
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No activity recorded yet.</td></tr>';
          return;
        }

        data.forEach(log => {
          const dateObj = new Date(log.date);
          const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString();
          
          let badgeClass = 'practice';
          let statusText = 'Needs Practice';
          
          if(log.score >= 9) {
            badgeClass = 'excellent';
            statusText = 'Passed (Excellent)';
          } else if(log.score >= 6) {
            badgeClass = 'good';
            statusText = 'Passed (Good)';
          }

          tbody.innerHTML += `
            <tr>
              <td style="font-size: 0.9em; color: var(--text-muted);">${dateStr}</td>
              <td style="font-weight: 600; color: var(--text-heading);">${log.username}</td>
              <td style="color: var(--accent); font-weight: bold;">${log.score} / 10</td>
              <td><span class="result-badge ${badgeClass}" style="font-size: 0.75rem; padding: 0.2rem 0.6rem; margin: 0;">${statusText}</span></td>
            </tr>
          `;
        });
      } catch(err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--wrong);">Failed to load data. See console.</td></tr>';
      }
    }

    // Fetch immediately
    fetchAdminData();
    // Refresh live every 5 seconds
    setInterval(fetchAdminData, 5000);
  </script>
</body>
</html>
